name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Successfully connected to Tencent Cloud via SSH!"
            
            # --- 实际部署脚本 ---
            cd /home/ubuntu/gambit-v1 || exit 1
            git pull
            sudo rm -rf .next
            
            # 确保环境变量能够读取到 pnpm 和 pm2
            export PATH=$PATH:/home/ubuntu/.local/share/pnpm:/home/ubuntu/.nvm/versions/node/$(node -v)/bin
            
            pnpm install
            pnpm build
            pm2 restart gambit
            echo "Deployment completed successfully!"
