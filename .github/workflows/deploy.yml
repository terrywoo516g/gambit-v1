name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Successfully connected to Tencent Cloud via SSH!"
            
            # --- 部署脚本示例 ---
            # 1. 切换到你的项目目录 (请根据你的服务器实际路径修改，这里假设是 ~/gambit-v1)
            cd ~/gambit-v1 || exit 1
            
            # 2. 拉取最新代码
            git pull origin main
            
            # 3. 安装依赖 (假设你使用 pnpm)
            pnpm install
            
            # 4. 构建生产环境代码
            pnpm run build
            
            # 5. 重启服务 (假设你使用 pm2 运行服务，进程名为 gambit)
            # pm2 restart gambit
            # 如果你没有用 pm2 启动过，可以使用： pm2 start pnpm --name "gambit" -- start
